{% assign post = include.post %}
<article class="entry">
  <h3 class="entry__title">
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </h3>
  {% if post.tags and post.tags.size > 0 %}
    <div class="entry__tags">
      {% for tag in post.tags limit: 5 %}<a href="{{ '/tags/' | append: tag | relative_url }}">{{ tag }}</a>{% unless forloop.last %}  ·  {% endunless %}{% endfor %}
    </div>
  {% endif %}
</article>
