# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en
timezone: America/Los_Angeles

# ↓ -------------------------- jekyll-seo-tag

title: AI &amp; Security Signal

tagline: Daily intelligence at the intersection of AI and cybersecurity

description: >-
  A daily journal tracking AI launches, supply chain attacks, CVEs, breaches,
  and emerging threats — short signal items plus the occasional deep dive.

url: "https://spbavarva.github.io"

github:
  username: spbavarva

twitter:
  username: bavarvasneh

social:
  name: Sneh Bavarva
  email: ""
  fediverse_handle:
  links:
    - https://twitter.com/bavarvasneh
    - https://github.com/spbavarva
    - https://linkedin.com/in/snehbavarva
    - https://snehbavarva.com

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ↑ -------------------------- end jekyll-seo-tag

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

# Force dark mode — this is a techy newsfeed, not a blog.
theme_mode: dark

cdn:

avatar: /assets/img/sidebar-logo-allmight.png

social_preview_image:

# Disabled site-wide; individual posts can re-enable if needed.
toc: false

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 15

baseurl: "/ai-security-signal"

# ------------ Internals ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: false
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
