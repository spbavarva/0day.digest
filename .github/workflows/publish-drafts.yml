name: Publish Drafts

# When a digest PR is merged, read the PR body checkboxes to see which items
# the reviewer kept checked, delete unchecked drafts, then promote the rest
# into _posts/. The existing pages-deploy.yml picks up the commit and ships.

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: publish-drafts
  cancel-in-progress: false

jobs:
  promote:
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply PR checkbox selections
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --json body -q .body > /tmp/pr-body.md
          python3 scripts/apply_selections.py --body /tmp/pr-body.md

      - name: Promote drafts
        run: python3 scripts/promote_drafts.py

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts _drafts
          if git diff --quiet --cached; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(publish): promote selected drafts"
          git push

      - name: Trigger site deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Build and Deploy"
