name: RSS Digest

on:
  schedule:
    # 03:00 and 13:00 America/New_York
    # (cron runs in UTC; adjust these two lines twice a year for DST if you care)
    - cron: "0 7 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Look-back window in hours"
        required: false
        default: "14"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: rss-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch feeds
        env:
          HOURS_INPUT: ${{ github.event.inputs.hours || '14' }}
        run: |
          set -euo pipefail
          # Strict validation: positive integer only. Refuses shell metacharacters.
          if ! [[ "$HOURS_INPUT" =~ ^[0-9]+$ ]]; then
            echo "ERROR: invalid hours input: $HOURS_INPUT" >&2
            exit 1
          fi
          python3 scripts/fetch_feeds.py --hours "$HOURS_INPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude triage (headless)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]]; then
            echo "ERROR: CLAUDE_CODE_OAUTH_TOKEN secret is not set in this repo." >&2
            echo "Add it at: Settings > Secrets and variables > Actions" >&2
            exit 1
          fi
          claude -p "$(cat scripts/prompts/triage.md)" \
            --permission-mode acceptEdits \
            --allowed-tools "Read,Write,Glob,Grep"

      - name: Stamp run metadata
        id: stamp
        run: |
          echo "stamp=$(date -u +%Y-%m-%d-%H%M)" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: digest/${{ steps.stamp.outputs.stamp }}
          delete-branch: true
          title: "Digest ${{ steps.stamp.outputs.stamp }}"
          body-path: _drafts/feed-digest-latest.md
          commit-message: "chore(digest): auto-fetched feeds + triage (${{ steps.stamp.outputs.stamp }})"
          add-paths: |
            scripts/feed-cache/**
            _drafts/**
          labels: |
            digest
            automated
